<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>检查记录审核（正常）</title>
    <style>
        :root {
            /* TDesign 主题色 */
            --td-brand-color: #0052d9;
            --td-brand-color-hover: #003cab;
            --td-brand-color-light: #ecf2fe;
            --td-brand-color-focus: #d9e1ff;

            /* 功能色 */
            --td-success-color: #2ba471;
            --td-success-color-light: #e3f9ed;
            --td-warning-color: #e37318;
            --td-warning-color-light: #fff1e6;
            --td-error-color: #d54941;
            --td-error-color-light: #fff0ed;

            /* 中性色 */
            --td-text-color-primary: #1a1a1a;
            --td-text-color-secondary: #444444;
            --td-text-color-placeholder: #bbbbbb;
            --td-text-color-disabled: #c0c0c0;

            /* 背景色 */
            --td-bg-color-page: #f5f5f5;
            --td-bg-color-container: #ffffff;
            --td-bg-color-secondary: #f5f5f5;

            /* 边框色 */
            --td-border-color: #e7e7e7;

            /* 圆角 */
            --td-radius-default: 6px;
            --td-radius-large: 12px;
            --td-radius-round: 999px;

            /* 字体大小 */
            --td-font-size-xs: 10px;
            --td-font-size-s: 12px;
            --td-font-size-base: 14px;
            --td-font-size-m: 16px;
            --td-font-size-l: 18px;

            /* 间距 */
            --td-spacer-1: 4px;
            --td-spacer-2: 8px;
            --td-spacer-3: 12px;
            --td-spacer-4: 16px;
            --td-spacer-5: 20px;
            --td-spacer-6: 24px;
            --td-spacer-8: 32px;

            /* 阴影 */
            --td-shadow-1: 0 1px 6px rgba(0, 0, 0, 0.05);
            --td-shadow-2: 0 4px 12px rgba(0, 0, 0, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(160deg, #0b1a3e 0%, #162d6e 40%, #1e3f8f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container { width: 100%; max-width: 480px; }

        .phone-frame {
            background: var(--td-bg-color-page);
            border-radius: var(--td-radius-large);
            box-shadow: 0 30px 60px rgba(0,0,0,0.3), 0 0 0 6px #111;
            overflow: hidden;
            height: 800px;
            display: flex;
            flex-direction: column;
        }

        /* ========== 顶部导航 ========== */
        .page-header {
            background: var(--td-brand-color);
            padding: 10px var(--td-spacer-4);
            padding-top: 36px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .page-header::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 28px;
            background: #000;
            border-radius: 14px;
        }

        .header-left { display: flex; align-items: center; gap: var(--td-spacer-2); }

        .header-back {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border-radius: 50%; transition: background 0.2s;
            color: #fff;
        }

        .header-back:active { background: rgba(255,255,255,0.15); }

        .header-title { font-size: var(--td-font-size-m); font-weight: 600; color: #fff; }

        .header-right { display: flex; align-items: center; }

        .header-btn-text {
            font-size: var(--td-font-size-s);
            color: rgba(255,255,255,0.9);
            padding: 6px 14px;
            background: rgba(255,255,255,0.15);
            border-radius: var(--td-radius-round);
            cursor: pointer; transition: background 0.2s;
            border: none; backdrop-filter: blur(4px);
        }

        .header-btn-text:active { background: rgba(255,255,255,0.25); }

        /* ========== Tab 导航 ========== */
        .tab-nav {
            display: flex;
            background: var(--td-bg-color-container);
            border-bottom: 1px solid var(--td-border-color);
            padding: 0 var(--td-spacer-1);
            flex-shrink: 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tab-nav::-webkit-scrollbar { display: none; }

        .tab-item {
            padding: var(--td-spacer-3) var(--td-spacer-3);
            font-size: var(--td-font-size-s);
            color: var(--td-text-color-placeholder);
            cursor: pointer; white-space: nowrap;
            border-bottom: 2px solid transparent;
            transition: all 0.2s; flex-shrink: 0;
            position: relative;
        }

        .tab-item:active { opacity: 0.7; }

        .tab-item.active {
            color: var(--td-brand-color);
            font-weight: 600;
            border-bottom-color: var(--td-brand-color);
        }

        .tab-item .changed-dot {
            position: absolute; top: 6px; right: 2px;
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--td-brand-color); display: none;
        }

        .tab-item.has-changes .changed-dot { display: block; }

        /* ========== 内容滚动区 ========== */
        .page-body {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: var(--td-spacer-3) var(--td-spacer-4);
            padding-bottom: 80px;
        }

        .page-body::-webkit-scrollbar { display: none; }

        /* ========== 区块卡片 ========== */
        .section-card {
            background: var(--td-bg-color-container);
            border-radius: var(--td-radius-large);
            box-shadow: var(--td-shadow-1);
            margin-bottom: var(--td-spacer-3);
        }

        .section-header {
            padding: var(--td-spacer-4) var(--td-spacer-4) 0;
            display: flex; align-items: center;
            gap: var(--td-spacer-2); cursor: pointer;
        }

        .section-dot {
            width: 4px; height: 16px; border-radius: 2px;
            background: var(--td-brand-color); flex-shrink: 0;
        }

        .section-title {
            font-size: var(--td-font-size-base); font-weight: 600;
            color: var(--td-text-color-primary); flex: 1;
        }

        .section-toggle {
            font-size: var(--td-font-size-s);
            color: var(--td-text-color-placeholder);
            transition: transform 0.2s;
        }

        .section-toggle.collapsed { transform: rotate(-90deg); }

        .section-body { padding: var(--td-spacer-3) var(--td-spacer-4) var(--td-spacer-4); overflow: visible; }
        .section-body.collapsed { display: none; }

        /* ========== 字段展示行 ========== */
        .field-row {
            display: flex;
            padding: var(--td-spacer-2) 0;
            border-bottom: 1px solid rgba(0,0,0,0.03);
            position: relative;
        }

        .field-row:last-child { border-bottom: none; }

        .field-row.changed {
            background: rgba(0,82,217,0.04);
            border-radius: var(--td-radius-default);
        }

        .field-row.changed::before {
            content: ''; position: absolute;
            left: calc(-1 * var(--td-spacer-4));
            top: 4px; bottom: 4px; width: 3px;
            background: var(--td-brand-color); border-radius: 2px;
        }

        .field-label {
            width: 140px; flex-shrink: 0;
            font-size: var(--td-font-size-s);
            color: var(--td-text-color-placeholder);
            line-height: 1.6; padding-top: 1px;
        }

        .field-value {
            flex: 1;
            font-size: var(--td-font-size-s);
            color: var(--td-text-color-primary);
            line-height: 1.6; min-width: 0; word-break: break-all;
        }

        .field-value input, .field-value select {
            width: 100%; border: none; outline: none;
            font-size: var(--td-font-size-s);
            color: var(--td-text-color-primary);
            background: transparent; font-family: inherit;
            padding: 0; line-height: 1.6;
        }

        .field-value input::placeholder, .field-value select:invalid {
            color: var(--td-text-color-placeholder);
        }

        .field-value input:focus, .field-value select:focus {
            border-bottom: 1px solid var(--td-brand-color);
            margin-bottom: -1px;
        }

        .field-value select { cursor: pointer; }

        .radio-group { display: flex; gap: var(--td-spacer-4); flex-wrap: wrap; }

        .radio-item {
            display: flex; align-items: center;
            gap: var(--td-spacer-1); cursor: pointer;
            font-size: var(--td-font-size-s);
            color: var(--td-text-color-primary);
        }

        .radio-item input[type="radio"] {
            width: 16px; height: 16px;
            accent-color: var(--td-brand-color); margin: 0;
        }

        .sub-group-title {
            font-size: var(--td-font-size-s); font-weight: 600;
            color: var(--td-text-color-secondary);
            padding: var(--td-spacer-3) 0 var(--td-spacer-2);
            border-bottom: 1px solid var(--td-border-color);
            margin-top: var(--td-spacer-1);
        }

        /* ========== 审核信息表单 ========== */
        .audit-form .conclusion-group {
            display: flex; gap: var(--td-spacer-6);
            padding: var(--td-spacer-2) 0;
        }

        .conclusion-item {
            display: flex; align-items: center;
            gap: var(--td-spacer-2); cursor: pointer;
            padding: 8px 20px; border-radius: var(--td-radius-round);
            transition: all 0.2s ease;
            border: 1.5px solid var(--td-border-color);
            background: var(--td-bg-color-container);
        }

        .conclusion-item:active { opacity: 0.7; }

        .conclusion-item.selected-pass {
            border-color: var(--td-success-color);
            background: var(--td-success-color-light);
        }

        .conclusion-item.selected-reject {
            border-color: var(--td-error-color);
            background: var(--td-error-color-light);
        }

        .conclusion-dot {
            width: 20px; height: 20px; border-radius: 50%;
            border: 2px solid var(--td-border-color);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease; flex-shrink: 0;
        }

        .conclusion-item.selected-pass .conclusion-dot {
            border-color: var(--td-success-color);
            background: var(--td-success-color);
        }

        .conclusion-item.selected-reject .conclusion-dot {
            border-color: var(--td-error-color);
            background: var(--td-error-color);
        }

        .conclusion-dot::after {
            content: ''; width: 7px; height: 7px;
            border-radius: 50%; background: #fff;
            opacity: 0; transition: opacity 0.15s;
        }

        .conclusion-item.selected-pass .conclusion-dot::after,
        .conclusion-item.selected-reject .conclusion-dot::after { opacity: 1; }

        .conclusion-label {
            font-size: var(--td-font-size-base);
            color: var(--td-text-color-primary); font-weight: 500;
        }

        .conclusion-item.selected-pass .conclusion-label { color: var(--td-success-color); }
        .conclusion-item.selected-reject .conclusion-label { color: var(--td-error-color); }

        .audit-textarea-wrap { margin-top: var(--td-spacer-3); }

        .audit-textarea-label {
            font-size: var(--td-font-size-s);
            color: var(--td-text-color-secondary);
            margin-bottom: var(--td-spacer-2);
            display: flex; align-items: center; gap: var(--td-spacer-1);
        }

        .required-star { color: var(--td-error-color); font-weight: 600; }
        .required-star.hidden { visibility: hidden; }

        .audit-textarea {
            width: 100%; min-height: 80px;
            padding: var(--td-spacer-3) var(--td-spacer-3);
            border: 1.5px solid var(--td-border-color);
            border-radius: var(--td-radius-default);
            font-size: var(--td-font-size-base);
            color: var(--td-text-color-primary);
            background: var(--td-bg-color-container);
            resize: vertical; outline: none;
            font-family: inherit; line-height: 1.6;
        }

        .audit-textarea:focus { border-color: var(--td-brand-color); }
        .audit-textarea::placeholder { color: var(--td-text-color-placeholder); }
        .audit-textarea.error { border-color: var(--td-error-color); }

        .error-tip {
            font-size: var(--td-font-size-xs);
            color: var(--td-error-color);
            margin-top: var(--td-spacer-1);
            display: none;
        }

        .error-tip.show { display: block; }

        /* ========== 底部提交栏 ========== */
        .submit-bar {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: var(--td-spacer-3) var(--td-spacer-5);
            padding-bottom: 28px;
            background: var(--td-bg-color-container);
            border-top: 1px solid var(--td-border-color);
            display: flex; gap: var(--td-spacer-3);
            z-index: 100;
            box-shadow: 0 -5px 10px rgba(0,0,0,0.05);
        }

        .submit-btn {
            flex: 1; padding: var(--td-spacer-3) 0;
            border-radius: var(--td-radius-default);
            font-size: var(--td-font-size-base); font-weight: 600;
            border: none; cursor: pointer; text-align: center;
        }

        .submit-btn:active { opacity: 0.7; }
        .submit-btn.primary { background: var(--td-brand-color); color: #fff; }
        .submit-btn.secondary { background: var(--td-bg-color-page); color: var(--td-text-color-secondary); }

        /* ========== 变更摘要浮标 ========== */
        .change-fab {
            position: absolute; bottom: 80px; right: var(--td-spacer-4);
            background: var(--td-brand-color); color: #fff;
            padding: var(--td-spacer-2) var(--td-spacer-3);
            border-radius: var(--td-radius-round);
            font-size: var(--td-font-size-s); font-weight: 600;
            cursor: pointer; z-index: 90;
            box-shadow: 0 4px 12px rgba(0,82,217,0.3);
            display: none; transition: transform 0.15s;
        }

        .change-fab:active { transform: scale(0.95); }
        .change-fab.show { display: flex; align-items: center; gap: var(--td-spacer-1); }

        /* ========== 时间轴弹窗 ========== */
        .timeline-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); z-index: 1500;
            display: none; align-items: flex-end; justify-content: center;
        }

        .timeline-overlay.show { display: flex; }

        .timeline-panel {
            width: 100%; max-width: 480px; max-height: 75vh;
            background: var(--td-bg-color-container);
            border-radius: var(--td-radius-large) var(--td-radius-large) 0 0;
            display: flex; flex-direction: column;
            animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1);
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .timeline-panel-header {
            padding: var(--td-spacer-4) var(--td-spacer-5);
            border-bottom: 1px solid var(--td-border-color);
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0;
        }

        .timeline-panel-title { font-size: var(--td-font-size-m); font-weight: 600; color: var(--td-text-color-primary); }

        .timeline-panel-close {
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; border-radius: 50%;
            color: var(--td-text-color-placeholder);
        }

        .timeline-panel-body { flex: 1; overflow-y: auto; padding: var(--td-spacer-5); }
        .timeline-panel-body::-webkit-scrollbar { display: none; }

        .timeline { position: relative; padding-left: 28px; }

        .timeline::before {
            content: ''; position: absolute;
            left: 9px; top: 6px; bottom: 6px; width: 2px;
            background: var(--td-border-color);
        }

        .timeline-item { position: relative; padding-bottom: var(--td-spacer-5); }
        .timeline-item:last-child { padding-bottom: 0; }

        .timeline-dot {
            position: absolute; left: -28px; top: 4px;
            width: 20px; height: 20px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; z-index: 1;
        }

        .timeline-dot.inspected { background: var(--td-brand-color-light); border: 2px solid var(--td-brand-color); }
        .timeline-dot.approved { background: var(--td-success-color-light); border: 2px solid var(--td-success-color); }
        .timeline-dot.rejected { background: var(--td-error-color-light); border: 2px solid var(--td-error-color); }
        .timeline-dot.verified { background: var(--td-warning-color-light); border: 2px solid var(--td-warning-color); }

        .timeline-dot svg { width: 10px; height: 10px; }

        .timeline-card {
            background: var(--td-bg-color-page);
            border-radius: var(--td-radius-default);
            padding: var(--td-spacer-3) var(--td-spacer-4);
        }

        .timeline-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--td-spacer-2); }

        .timeline-flow { font-size: var(--td-font-size-base); font-weight: 600; color: var(--td-text-color-primary); }

        .timeline-result-tag {
            font-size: var(--td-font-size-xs);
            padding: 2px 10px; border-radius: var(--td-radius-round); font-weight: 500;
        }

        .timeline-result-tag.pass { background: var(--td-success-color-light); color: var(--td-success-color); }
        .timeline-result-tag.reject { background: var(--td-error-color-light); color: var(--td-error-color); }
        .timeline-result-tag.info { background: var(--td-brand-color-light); color: var(--td-brand-color); }
        .timeline-result-tag.verify { background: var(--td-warning-color-light); color: var(--td-warning-color); }

        .timeline-meta { font-size: var(--td-font-size-xs); color: var(--td-text-color-placeholder); margin-bottom: var(--td-spacer-2); }
        .timeline-meta span { margin-right: var(--td-spacer-3); }

        .timeline-opinion {
            font-size: var(--td-font-size-s); color: var(--td-text-color-secondary);
            padding: var(--td-spacer-2) var(--td-spacer-3);
            background: var(--td-bg-color-container);
            border-radius: var(--td-radius-default);
            border-left: 3px solid var(--td-brand-color);
            margin-top: var(--td-spacer-2); line-height: 1.5;
        }

        .timeline-changes {
            font-size: var(--td-font-size-s); color: var(--td-text-color-secondary);
            padding: var(--td-spacer-2) var(--td-spacer-3);
            background: var(--td-bg-color-container);
            border-radius: var(--td-radius-default);
            border-left: 3px solid var(--td-warning-color);
            margin-top: var(--td-spacer-2); line-height: 1.5;
        }

        .change-field { font-weight: 600; color: var(--td-text-color-primary); }
        .change-old { text-decoration: line-through; color: var(--td-error-color); font-size: var(--td-font-size-xs); }
        .change-new { color: var(--td-success-color); font-weight: 500; }

        /* ========== Toast ========== */
        .fa-toast {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75); color: #fff;
            padding: var(--td-spacer-3) 28px;
            border-radius: var(--td-radius-default);
            font-size: var(--td-font-size-base);
            z-index: 2000; display: none;
        }

        .fa-toast.show { display: block; animation: toastFade 0.2s ease; }

        @keyframes toastFade {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        /* ========== 问号提示图标 ========== */
        .verified-icon {
            display: inline-flex; align-items: center; justify-content: center;
            width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0;
            background: var(--td-warning-color-light); color: var(--td-warning-color);
            font-size: 9px; font-weight: 700; cursor: pointer;
            vertical-align: middle; margin-left: 2px;
        }
        .verified-icon::before { content: '?'; }

        /* 全局提示浮层 */
        .global-tip {
            position: fixed; z-index: 9999; pointer-events: none;
            background: var(--td-warning-color); color: #fff;
            font-size: var(--td-font-size-xs); font-weight: 400;
            padding: 6px 12px; border-radius: var(--td-radius-default);
            max-width: 220px; line-height: 1.5;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            opacity: 0; transition: opacity 0.15s;
        }
        .global-tip.show { opacity: 1; }
        .global-tip::after {
            content: ''; position: absolute;
            border: 5px solid transparent;
        }
        .global-tip.arrow-bottom::after {
            top: 100%; left: 50%; transform: translateX(-50%);
            border-top-color: var(--td-warning-color);
        }
        .global-tip.arrow-top::after {
            bottom: 100%; left: 50%; transform: translateX(-50%);
            border-bottom-color: var(--td-warning-color);
        }

        .hidden { display: none !important; }

        html.in-iframe body { background: var(--td-bg-color-page); padding: 0; }
        html.in-iframe .phone-frame { border-radius: 0; box-shadow: none; height: 100vh; }
    </style>
</head>
<body>
    <div class="container">
        <div class="phone-frame">
            <div class="page-header">
                <div class="header-left">
                    <span class="header-back" onclick="navigateBack()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
                    </span>
                    <span class="header-title">检查记录审核</span>
                </div>
                <div class="header-right">
                    <button class="header-btn-text" onclick="openTimeline()">审核记录</button>
                </div>
            </div>
            <div class="tab-nav" id="tabNav"></div>
            <div class="page-body" id="pageBody"></div>
            <div class="change-fab" id="changeFab" onclick="showChangeSummary()"></div>
            <div class="submit-bar">
                <button class="submit-btn secondary" onclick="navigateBack()">取消</button>
                <button class="submit-btn primary" onclick="handleSubmit()">提交审核</button>
            </div>
        </div>
    </div>
    <div class="timeline-overlay" id="timelineOverlay" onclick="closeTimeline()">
        <div class="timeline-panel" onclick="event.stopPropagation()">
            <div class="timeline-panel-header">
                <span class="timeline-panel-title">审核记录</span>
                <span class="timeline-panel-close" onclick="closeTimeline()">

// ====== 变更追踪 ======
const changes = new Map();

function onFieldChange(key, newVal) {
    const orig = MOCK[key] ?? '';
    const row = document.querySelector(`.field-row[data-key="${key}"]`);
    if (newVal !== orig) {
        changes.set(key, {old:orig, new:newVal});
        if (row) row.classList.add('changed');
    } else {
        changes.delete(key);
        if (row) row.classList.remove('changed');
    }
    updateConditionalFields();
    updateChangeFab();
    updateTabDots();
}

function updateConditionalFields() {
    document.querySelectorAll('.field-row[data-show-when]').forEach(row => {
        const cond = JSON.parse(row.dataset.showWhen);
        const current = getFieldValue(cond.f);
        row.classList.toggle('hidden', current !== cond.v);
    });
}

function getFieldValue(key) {
    const el = document.querySelector(`[data-field="${key}"]`);
    if (!el) return MOCK[key] ?? '';
    if (el.classList.contains('radio-group')) {
        const checked = el.querySelector('input:checked');
        return checked ? checked.value : '';
    }
    return el.value;
}

function updateChangeFab() {
    const fab = document.getElementById('changeFab');
    if (changes.size > 0) {
        fab.textContent = changes.size + ' 处修改';
        fab.classList.add('show');
    } else {
        fab.classList.remove('show');
    }
}

function updateTabDots() {
    const tabCounts = {};
    changes.forEach((_, key) => {
        for (let i = 0; i < TAB_GROUPS.length; i++) {
            const grp = TAB_GROUPS[i];
            const sec = SECTIONS[grp.sectionIds.find(sid => SECTIONS[sid]?.groups?.some(g => g.fields.some(f => f.k === key)))];
            if (sec) { tabCounts[i] = (tabCounts[i]||0) + 1; break; }
        }
    });
    TAB_GROUPS.forEach((_, i) => {
        const tabEl = document.querySelector(`.tab-item[data-idx="${i}"]`);
        if (tabEl) tabEl.classList.toggle('has-changes', !!tabCounts[i]);
    });
}

function showChangeSummary() {
    if (changes.size === 0) { showToast('暂无修改'); return; }
    let items = [];
    changes.forEach((v, k) => {
        const allFields = Object.values(SECTIONS).flatMap(s => s.groups ? s.groups.flatMap(g => g.fields) : []);
        const fDef = allFields.find(f => f.k === k);
        items.push(`"${fDef?fDef.l:k}"：${v.old||'（空）'} → ${v.new||'（空）'}`);
    });
    showToast('共 ' + items.length + ' 处修改：' + items.join('；'));
}

// ====== 渲染 ======
function renderAll() {
    // Tab 导航
    let tabHtml = '';
    TAB_GROUPS.forEach((tg, i) => {
        tabHtml += `<div class="tab-item${i===0?' active':''}" data-idx="${i}" onclick="switchTab(${i})">${tg.label}<span class="changed-dot"></span></div>`;
    });
    document.getElementById('tabNav').innerHTML = tabHtml;

    // 内容区 — 全部渲染为一个长页面
    let bodyHtml = '';
    TAB_GROUPS.forEach((tg) => {
        bodyHtml += `<div id="${tg.tabId}">`;
        tg.sectionIds.forEach(sid => {
            if (sid === 'auditSection') {
                bodyHtml += renderAuditSection();
            } else {
                const sec = SECTIONS[sid];
                if (!sec) return;
                bodyHtml += renderSection(sid, sec);
            }
        });
        bodyHtml += `</div>`;
    });
    document.getElementById('pageBody').innerHTML = bodyHtml;
}

function renderSection(sid, sec) {
    let h = `<div class="section-card"><div class="section-header" onclick="toggleSection('${sid}')">
        <span class="section-dot"></span><span class="section-title">${sec.title}</span>
        <span class="section-toggle" id="toggle_${sid}">▼</span></div>
        <div class="section-body" id="body_${sid}">`;
    if (sec.readonly) {
        sec.fields.forEach(([l,v]) => {
            h += `<div class="field-row"><span class="field-label">${l}</span><span class="field-value">${v}</span></div>`;
        });
    } else {
        sec.groups.forEach(g => {
            h += `<div class="sub-group-title">${g.title}</div>`;
            g.fields.forEach(f => {
                const val = MOCK[f.k] ?? '';
                const showAttr = f.showWhen ? `data-show-when='${JSON.stringify(f.showWhen)}'` : '';
                const hideClass = f.showWhen && MOCK[f.showWhen.f] !== f.showWhen.v ? ' hidden' : '';
                const vIcon = f.v ? `<span class="verified-icon" data-tip="${f.v}" onclick="showGlobalTip(this)" ontouchstart="showGlobalTip(this)"></span>` : '';
                h += `<div class="field-row${hideClass}" data-key="${f.k}" ${showAttr}>
                    <span class="field-label">${f.l}${vIcon}</span>
                    <span class="field-value">${renderField(f,val)}</span></div>`;
            });
        });
    }
    return h + `</div></div>`;
}

function renderAuditSection() {
    return `<div class="section-card">
        <div class="section-header"><span class="section-dot"></span><span class="section-title">审核信息</span></div>
        <div class="section-body"><div class="audit-form">
            <div class="conclusion-group">
                <div class="conclusion-item" id="conclPass" onclick="selectConclusion('pass')">
                    <span class="conclusion-dot"></span><span class="conclusion-label">通过</span></div>
                <div class="conclusion-item" id="conclReject" onclick="selectConclusion('reject')">
                    <span class="conclusion-dot"></span><span class="conclusion-label">不通过</span></div>
            </div>
            <div class="audit-textarea-wrap">
                <div class="audit-textarea-label">
                    <span class="required-star hidden" id="reqStar">*</span><span>审核意见</span></div>
                <textarea class="audit-textarea" id="auditOpinion" placeholder="请输入审核意见" oninput="onOpinionInput()"></textarea>
                <div class="error-tip" id="errorTip">不通过时审核意见为必填项</div>
            </div>
        </div></div></div>`;
}

function renderField(f, val) {
    if (f.t === 'readonly') return val || '—';
    if (['text','number','tel'].includes(f.t))
        return `<input type="${f.t}" value="${esc(val)}" data-field="${f.k}" data-original="${esc(val)}" oninput="onFieldChange('${f.k}',this.value)" placeholder="请输入">`;
    if (f.t === 'date')
        return `<input type="date" value="${esc(val)}" data-field="${f.k}" data-original="${esc(val)}" onchange="onFieldChange('${f.k}',this.value)">`;
    if (f.t === 'select') {
        let s = `<select data-field="${f.k}" data-original="${esc(val)}" onchange="onFieldChange('${f.k}',this.value)"><option value="">请选择</option>`;
        (f.opts||[]).forEach(o => { s += `<option value="${o}"${val===o?' selected':''}>${o}</option>`; });
        return s + `</select>`;
    }
    if (f.t === 'radio') {
        let r = `<div class="radio-group" data-field="${f.k}" data-original="${esc(val)}">`;
        (f.opts||[]).forEach(o => {
            r += `<label class="radio-item"><input type="radio" name="field_${f.k}" value="${o}"${val===o?' checked':''} onchange="onFieldChange('${f.k}','${o}')"><span>${o}</span></label>`;
        });
        return r + `</div>`;
    }
    return val || '—';
}

function esc(s) { return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function toggleSection(id) {
    const body = document.getElementById('body_' + id);
    const toggle = document.getElementById('toggle_' + id);
    if (body && toggle) { body.classList.toggle('collapsed'); toggle.classList.toggle('collapsed'); }
}

function switchTab(idx) {
    activeTab = idx;
    document.querySelectorAll('.tab-item').forEach((el,i) => el.classList.toggle('active', i===idx));
    const target = document.getElementById(TAB_GROUPS[idx].tabId);
    if (target) {
        const pageBody = document.getElementById('pageBody');
        const tabNavH = document.querySelector('.tab-nav').offsetHeight;
        pageBody.scrollTo({ top: target.offsetTop - 4, behavior: 'smooth' });
    }
}

// 滚动时自动高亮当前 Tab
function setupScrollSpy() {
    const pageBody = document.getElementById('pageBody');
    let scrollTimer = null;
    let isManualScroll = false;

    // 点击 Tab 时标记为手动滚动，避免滚动监听抢占
    document.querySelectorAll('.tab-item').forEach(el => {
        el.addEventListener('click', () => { isManualScroll = true; });
    });

    pageBody.addEventListener('scroll', () => {
        clearTimeout(scrollTimer);
        if (isManualScroll) {
            scrollTimer = setTimeout(() => { isManualScroll = false; }, 600);
            return;
        }
        const anchors = TAB_GROUPS.map(tg => document.getElementById(tg.tabId));
        let newActive = 0;
        anchors.forEach((el, i) => {
            if (el && el.offsetTop - 20 <= pageBody.scrollTop) newActive = i;
        });
        if (newActive !== activeTab) {
            activeTab = newActive;
            document.querySelectorAll('.tab-item').forEach((el,i) => el.classList.toggle('active', i===newActive));
        }
    });
}

// ====== 审核 ======
let auditConclusion = '';
function selectConclusion(type) {
    auditConclusion = type;
    document.getElementById('conclPass').className = 'conclusion-item' + (type==='pass'?' selected-pass':'');
    document.getElementById('conclReject').className = 'conclusion-item' + (type==='reject'?' selected-reject':'');
    document.getElementById('reqStar').classList.toggle('hidden', type !== 'reject');
    document.getElementById('auditOpinion').classList.remove('error');
    document.getElementById('errorTip').classList.remove('show');
}
function onOpinionInput() {
    document.getElementById('auditOpinion').classList.remove('error');
    document.getElementById('errorTip').classList.remove('show');
}

function handleSubmit() {
    if (!auditConclusion) { showToast('请选择审核结论'); return; }
    const opinion = document.getElementById('auditOpinion').value.trim();
    if (auditConclusion === 'reject' && !opinion) {
        document.getElementById('auditOpinion').classList.add('error');
        document.getElementById('errorTip').classList.add('show');
        return;
    }
    const conclusionText = auditConclusion === 'pass' ? '通过' : '不通过';
    const changeList = [];
    changes.forEach((v, k) => {
        const allFields = Object.values(SECTIONS).flatMap(s => s.groups ? s.groups.flatMap(g => g.fields) : []);
        const fDef = allFields.find(f => f.k === k);
        changeList.push({field:fDef?fDef.l:k, oldVal:v.old||'（空）', newVal:v.new||'（空）'});
    });
    if (window.parent !== window) {
        window.parent.postMessage({type:'formSubmitted',data:{houseId,conclusion:conclusionText,opinion,changes:changeList}},'*');
    } else {
        showToast('审核已提交：' + conclusionText + (changeList.length ? '，修改' + changeList.length + '项' : ''));
    }
}

    document.getElementById('timelineBody').innerHTML = `<div class="timeline">${

            const tc = r.result==='已检查'?'info':r.result==='不通过'?'reject':r.result==='已核实'?'verify':'pass';
            const ic = r.result==='已检查'?'#0052d9':r.result==='不通过'?'#d54941':r.result==='已核实'?'#e37318':'#2ba471';
            return `<div class="timeline-item"><div class="timeline-dot ${dc}"><svg viewBox="0 0 24 24" fill="none" stroke="${ic}" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg></div>

// ====== 导航 / Toast ======
function navigateBack() {
    if (window.parent !== window) window.parent.postMessage({type:'navigateBack'},'*');
    else window.history.back();
}
function showToast(msg) {
    const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

// ====== 全局提示浮层 ======
let tipTimer = null;
function showGlobalTip(el) {
    clearTimeout(tipTimer);
    const tip = document.getElementById('globalTip');
    const text = el.getAttribute('data-tip');
    if (!text) return;
    tip.textContent = text;
    tip.className = 'global-tip';

    // 先隐藏显示以获取尺寸
    tip.style.visibility = 'hidden';
    tip.className = 'global-tip show';
    const tipH = tip.offsetHeight;
    const tipW = tip.offsetWidth;

    const rect = el.getBoundingClientRect();
    const gap = 8;

    // 判断上方空间是否足够
    const showAbove = rect.top > tipH + gap + 10;

    let left = rect.left + rect.width / 2 - tipW / 2;
    if (left < 8) left = 8;
    if (left + tipW > window.innerWidth - 8) left = window.innerWidth - tipW - 8;

    const top = showAbove ? rect.top - tipH - gap : rect.bottom + gap;
    const arrow = showAbove ? 'arrow-bottom' : 'arrow-top';

    tip.style.left = left + 'px';
    tip.style.top = top + 'px';
    tip.style.visibility = '';
    tip.className = 'global-tip show ' + arrow;

    tipTimer = setTimeout(() => { tip.className = 'global-tip'; }, 2500);
}

        const tip = document.getElementById('globalTip');
