<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网格巡查记录</title>
    <style>
        :root {
            --fa-primary: #0b68da;
            --fa-primary-hover: #0956b8;
            --fa-primary-light: #d2e1f6;
            --fa-primary-focus: #cde0fc;
            --fa-success: #67c23a;
            --fa-success-light: #f1f8ec;
            --fa-warning: #f69e1b;
            --fa-warning-light: #fcf5ea;
            --fa-danger: #ff5e5e;
            --fa-danger-light: #fcefef;
            --fa-text-primary: #303133;
            --fa-text-secondary: #606266;
            --fa-text-placeholder: #909399;
            --fa-text-disabled: #c0c4cc;
            --fa-text-field-label: #7f7f7f;
            --fa-bg-page: #efeff4;
            --fa-bg-container: #ffffff;
            --fa-bg-secondary: #efeff4;
            --fa-border: #eee;
            --fa-radius: 5px;
            --fa-radius-lg: 5px;
            --fa-radius-round: 999px;
            --fa-font-size-xs: 12px;
            --fa-font-size-s: 12px;
            --fa-font-size-base: 14px;
            --fa-font-size-m: 16px;
            --fa-font-size-l: 18px;
            --fa-spacer-1: 4px;
            --fa-spacer-2: 8px;
            --fa-spacer-3: 12px;
            --fa-spacer-4: 16px;
            --fa-spacer-5: 20px;
            --fa-spacer-6: 24px;
            --fa-spacer-8: 32px;
            --fa-shadow-1: 0 4px 16px 0 #0000000d;
            --fa-shadow-2: 0 -5px 10px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: "Alibaba PuHuiTi 2.0", -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--fa-bg-page);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container { width: 100%; max-width: 480px; }

        .phone-frame {
            background: var(--fa-bg-page);
            border-radius: var(--fa-radius-lg);
            box-shadow: 0 30px 60px rgba(0,0,0,0.3), 0 0 0 6px #111;
            overflow: hidden;
            height: 800px;
            display: flex;
            flex-direction: column;
        }

        /* ========== 导航栏 ========== */
        .nav-bar {
            background: var(--fa-bg-container);
            flex-shrink: 0;
            border-bottom: 1px solid var(--fa-border);
        }
        .nav-status-bar {
            padding: 8px var(--fa-spacer-5);
            display: flex;
            justify-content: space-between;
            font-size: var(--fa-font-size-s);
            color: var(--fa-text-secondary);
        }
        .nav-content {
            padding: var(--fa-spacer-3) var(--fa-spacer-5);
            display: flex;
            align-items: center;
            gap: var(--fa-spacer-3);
        }
        .nav-back {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border: none; background: none; cursor: pointer;
            color: var(--fa-text-secondary); border-radius: 50%;
            transition: background 0.15s;
        }
        .nav-back:active { background: rgba(0,0,0,0.05); }
        .nav-title {
            font-size: var(--fa-font-size-m);
            font-weight: 700;
            color: var(--fa-text-primary);
            letter-spacing: 1px;
        }

        /* ========== 房屋信息头部 ========== */
        .house-header {
            background: linear-gradient(180deg, #eaf2ff 0%, #ffffff 100%);
            padding: var(--fa-spacer-4) var(--fa-spacer-5);
            border-bottom: 1px solid #d6e4f5;
            flex-shrink: 0;
            position: relative;
        }
        .house-header-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
        }
        .house-info-left { flex: 1; min-width: 0; }
        .house-name-row {
            display: flex;
            align-items: center;
            gap: var(--fa-spacer-2);
            margin-bottom: var(--fa-spacer-2);
        }
        .house-name {
            font-size: var(--fa-font-size-m);
            font-weight: 600;
            color: var(--fa-text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .house-code-tag {
            font-size: var(--fa-font-size-xs);
            padding: 2px 8px;
            border-radius: var(--fa-radius-round);
            background: var(--fa-primary-light);
            color: var(--fa-primary);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .house-address {
            font-size: var(--fa-font-size-s);
            color: var(--fa-text-placeholder);
            display: flex;
            align-items: center;
            gap: var(--fa-spacer-1);
        }
        .house-address svg {
            width: 14px; height: 14px;
            fill: none; stroke: var(--fa-text-placeholder);
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
        }

        /* 历史记录按钮 */
        .btn-history {
            font-size: var(--fa-font-size-xs);
            padding: 5px 12px;
            border-radius: var(--fa-radius-round);
            border: 1px solid var(--fa-primary);
            background: transparent;
            color: var(--fa-primary);
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .btn-history:active { background: var(--fa-primary-light); }

        /* ========== 滚动内容 ========== */
        .scroll-content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* ========== 信息区块 ========== */
        .section-card {
            background: var(--fa-bg-container);
            margin: var(--fa-spacer-3) var(--fa-spacer-4);
            border-radius: var(--fa-radius-lg);
            box-shadow: var(--fa-shadow-1);
            overflow: hidden;
        }
        .section-header {
            display: flex;
            align-items: center;
            gap: var(--fa-spacer-2);
            padding: var(--fa-spacer-3) var(--fa-spacer-4);
            border-bottom: 1px solid var(--fa-border);
        }
        .section-dot {
            width: 4px; height: 16px;
            border-radius: 2px;
            background: var(--fa-primary);
        }
        .section-title {
            font-size: var(--fa-font-size-base);
            font-weight: 600;
            color: var(--fa-text-primary);
        }
        .section-body {
            padding: var(--fa-spacer-2) var(--fa-spacer-4) var(--fa-spacer-4);
        }

        /* ========== 字段行 ========== */
        .field-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--fa-border);
            gap: var(--fa-spacer-3);
        }
        .field-row:last-child { border-bottom: none; }
        .field-label {
            font-size: var(--fa-font-size-s);
            color: var(--fa-text-field-label);
            white-space: nowrap;
            flex-shrink: 0;
            line-height: 1.6;
        }
        .field-value {
            font-size: var(--fa-font-size-s);
            color: var(--fa-text-primary);
            text-align: right;
            word-break: break-all;
            line-height: 1.6;
        }

        /* ========== 是/否标签 ========== */
        .tag-yes {
            display: inline-block;
            font-size: var(--fa-font-size-xs);
            padding: 2px 10px;
            border-radius: var(--fa-radius-round);
            background: var(--fa-danger-light);
            color: var(--fa-danger);
            font-weight: 500;
        }
        .tag-no {
            display: inline-block;
            font-size: var(--fa-font-size-xs);
            padding: 2px 10px;
            border-radius: var(--fa-radius-round);
            background: var(--fa-success-light);
            color: var(--fa-success);
            font-weight: 500;
        }

        /* ========== 匹配标签 ========== */
        .tag-match {
            display: inline-block;
            font-size: var(--fa-font-size-xs);
            padding: 2px 10px;
            border-radius: var(--fa-radius-round);
            background: var(--fa-primary-light);
            color: var(--fa-primary);
            font-weight: 500;
        }

        /* ========== Toast ========== */
        .td-toast {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: #fff;
            padding: 10px 24px;
            border-radius: 5px;
            font-size: 13px;
            z-index: 9999;
            display: none;
            pointer-events: none;
        }
        .td-toast.show { display: block; animation: toastFade 0.2s ease; }
        @keyframes toastFade {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        /* ========== iframe 适配 ========== */
        html.in-iframe body { background: var(--fa-bg-page); }
        html.in-iframe .phone-frame {
            border-radius: 0;
            box-shadow: none;
            height: 100vh;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="phone-frame">
        <!-- 导航栏 -->
        <div class="nav-bar">
            <div class="nav-status-bar">
                <span>09:41</span>
                <span>●●● WiFi ▊</span>
            </div>
            <div class="nav-content">
                <button class="nav-back" onclick="goBack()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <span class="nav-title">网格巡查记录</span>
            </div>
        </div>

        <!-- 房屋信息头部 -->
        <div class="house-header">
            <div class="house-header-top">
                <div class="house-info-left">
                    <div class="house-name-row">
                        <span class="house-name" id="houseName">罗湖区水闸1号楼</span>
                        <span class="house-code-tag" id="houseCode">4403030991</span>
                    </div>
                    <div class="house-address">
                        <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                        <span id="houseArea">罗湖区</span>
                    </div>
                </div>
                <button class="btn-history" onclick="onHistoryClick()">历史记录</button>
            </div>
        </div>

        <!-- 滚动内容 -->
        <div class="scroll-content">
            <div class="section-card">
                <div class="section-header">
                    <span class="section-dot"></span>
                    <span class="section-title">最新网格巡查信息</span>
                </div>
                <div class="section-body" id="gridInfoBody">
                    <!-- JS 渲染 -->
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div class="td-toast" id="toast"></div>
    </div>
</div>

<script>
    // iframe 检测
    if (window.parent !== window) document.documentElement.classList.add('in-iframe');

    // ====== URL 参数 ======
    function getUrlParams() {
        const p = new URLSearchParams(window.location.search);
        return {
            houseId: p.get('houseId') || '1',
            houseName: p.get('houseName') || '罗湖区水闸1号楼',
            houseCode: p.get('houseCode') || '4403030991',
            houseArea: p.get('houseArea') || p.get('area') || '罗湖区'
        };
    }

    // ====== Mock 数据 ======
    const LATEST_RECORD = {
        accessTime: '2025-06-27 05:04:28',
        buildingCode: '4403030100010300147',
        xCoord: '114.162454229736',
        yCoord: '22.5677649701873',
        district: '罗湖区',
        isBusinessPlace: '是',
        businessPurpose: '餐饮小吃店',
        hasDecoration: '是',
        hasAddition: '是',
        hasFunctionChange: '否',
        hasGroundCrack: '是',
        hasUndergroundWork: '是',
        hasSlope: '是',
        hasResidents: '是',
        dataSource: '市数据共享平台',
        matchStatus: '自动匹配'
    };

    // ====== 渲染 ======
    function renderHeader() {
        const p = getUrlParams();
        document.getElementById('houseName').textContent = p.houseName;
        document.getElementById('houseCode').textContent = p.houseCode;
        document.getElementById('houseArea').textContent = p.houseArea;
    }

    function tag(val) {
        if (val === '是') return '<span class="tag-yes">是</span>';
        if (val === '否') return '<span class="tag-no">否</span>';
        return val;
    }

    function renderGridInfo() {
        const r = LATEST_RECORD;
        const fields = [
            ['接入时间', r.accessTime],
            ['建筑编码', r.buildingCode],
            ['X坐标', r.xCoord],
            ['Y坐标', r.yCoord],
            ['行政区划', r.district],
            ['是否经营性场所', tag(r.isBusinessPlace)],
            ['经营性用途', r.businessPurpose],
            ['是否装修', tag(r.hasDecoration)],
            ['是否加建', tag(r.hasAddition)],
            ['是否改变功能', tag(r.hasFunctionChange)],
            ['是否地面下沉开裂', tag(r.hasGroundCrack)],
            ['是否地下施工', tag(r.hasUndergroundWork)],
            ['是否山体边坡', tag(r.hasSlope)],
            ['是否有人居住', tag(r.hasResidents)],
            ['数据来源', r.dataSource],
            ['与系统建筑编码匹配情况', '<span class="tag-match">' + r.matchStatus + '</span>']
        ];
        let html = '';
        fields.forEach(([label, value]) => {
            html += '<div class="field-row"><span class="field-label">' + label + '</span><span class="field-value">' + value + '</span></div>';
        });
        document.getElementById('gridInfoBody').innerHTML = html;
    }

    // ====== 导航 ======
    function goBack() {
        if (window.parent !== window) {
            window.parent.postMessage({ type: 'navigateBack' }, '*');
        } else {
            history.back();
        }
    }

    function navigateToPage(tab, params) {
        if (window.parent !== window) {
            window.parent.postMessage({ type: 'navigateToPage', tab: tab, params: params || {} }, '*');
        }
    }

    function onHistoryClick() {
        const p = getUrlParams();
        navigateToPage('gridRecordHistory', p);
    }

    // ====== Toast ======
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    // ====== 初始化 ======
    renderHeader();
    renderGridInfo();
</script>

</body>
</html>
