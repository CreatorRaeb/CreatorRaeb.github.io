<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史网格巡查记录</title>
    <style>
        :root {
            --fa-primary: #0b68da;
            --fa-primary-hover: #0956b8;
            --fa-primary-light: #d2e1f6;
            --fa-primary-focus: #cde0fc;
            --fa-success: #67c23a;
            --fa-success-light: #f1f8ec;
            --fa-warning: #f69e1b;
            --fa-warning-light: #fcf5ea;
            --fa-danger: #ff5e5e;
            --fa-danger-light: #fcefef;
            --fa-text-primary: #303133;
            --fa-text-secondary: #606266;
            --fa-text-placeholder: #909399;
            --fa-text-disabled: #c0c4cc;
            --fa-text-field-label: #7f7f7f;
            --fa-bg-page: #efeff4;
            --fa-bg-container: #ffffff;
            --fa-bg-secondary: #efeff4;
            --fa-border: #eee;
            --fa-radius: 5px;
            --fa-radius-lg: 5px;
            --fa-radius-round: 999px;
            --fa-font-size-xs: 12px;
            --fa-font-size-s: 12px;
            --fa-font-size-base: 14px;
            --fa-font-size-m: 16px;
            --fa-font-size-l: 18px;
            --fa-spacer-1: 4px;
            --fa-spacer-2: 8px;
            --fa-spacer-3: 12px;
            --fa-spacer-4: 16px;
            --fa-spacer-5: 20px;
            --fa-spacer-6: 24px;
            --fa-spacer-8: 32px;
            --fa-shadow-1: 0 4px 16px 0 #0000000d;
            --fa-shadow-2: 0 -5px 10px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: "Alibaba PuHuiTi 2.0", -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--fa-bg-page);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container { width: 100%; max-width: 480px; }

        .phone-frame {
            background: var(--fa-bg-page);
            border-radius: var(--fa-radius-lg);
            box-shadow: 0 30px 60px rgba(0,0,0,0.3), 0 0 0 6px #111;
            overflow: hidden;
            height: 800px;
            display: flex;
            flex-direction: column;
        }

        /* ========== 导航栏 ========== */
        .nav-bar {
            background: var(--fa-bg-container);
            flex-shrink: 0;
            border-bottom: 1px solid var(--fa-border);
        }
        .nav-status-bar {
            padding: 8px var(--fa-spacer-5);
            display: flex;
            justify-content: space-between;
            font-size: var(--fa-font-size-s);
            color: var(--fa-text-secondary);
        }
        .nav-content {
            padding: var(--fa-spacer-3) var(--fa-spacer-5);
            display: flex;
            align-items: center;
            gap: var(--fa-spacer-3);
        }
        .nav-back {
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border: none; background: none; cursor: pointer;
            color: var(--fa-text-secondary); border-radius: 50%;
            transition: background 0.15s;
        }
        .nav-back:active { background: rgba(0,0,0,0.05); }
        .nav-title {
            font-size: var(--fa-font-size-m);
            font-weight: 700;
            color: var(--fa-text-primary);
            letter-spacing: 1px;
        }

        /* ========== 滚动内容 ========== */
        .scroll-content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: var(--fa-spacer-3) var(--fa-spacer-4);
        }

        /* ========== 记录卡片 ========== */
        .record-card {
            background: var(--fa-bg-container);
            border-radius: var(--fa-radius-lg);
            box-shadow: var(--fa-shadow-1);
            padding: var(--fa-spacer-4);
            margin-bottom: var(--fa-spacer-3);
            cursor: pointer;
            transition: box-shadow 0.15s;
        }
        .record-card:active {
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .record-time {
            font-size: var(--fa-font-size-base);
            font-weight: 600;
            color: var(--fa-primary);
            margin-bottom: var(--fa-spacer-3);
            padding-bottom: var(--fa-spacer-2);
            border-bottom: 1px solid var(--fa-border);
        }
        .record-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--fa-spacer-2) var(--fa-spacer-4);
        }
        .record-field {
            display: flex;
            align-items: center;
            gap: var(--fa-spacer-1);
            font-size: var(--fa-font-size-s);
        }
        .record-field-label {
            color: var(--fa-text-field-label);
            white-space: nowrap;
        }

        /* ========== 是/否标签 ========== */
        .tag-yes {
            display: inline-block;
            font-size: var(--fa-font-size-xs);
            padding: 2px 10px;
            border-radius: var(--fa-radius-round);
            background: var(--fa-danger-light);
            color: var(--fa-danger);
            font-weight: 500;
        }
        .tag-no {
            display: inline-block;
            font-size: var(--fa-font-size-xs);
            padding: 2px 10px;
            border-radius: var(--fa-radius-round);
            background: var(--fa-success-light);
            color: var(--fa-success);
            font-weight: 500;
        }

        /* ========== 空状态 ========== */
        .empty-state {
            text-align: center;
            padding: var(--fa-spacer-8) 0;
            color: var(--fa-text-placeholder);
            font-size: var(--fa-font-size-base);
        }

        /* ========== Toast ========== */
        .td-toast {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: #fff;
            padding: 10px 24px;
            border-radius: 5px;
            font-size: 13px;
            z-index: 9999;
            display: none;
            pointer-events: none;
        }
        .td-toast.show { display: block; animation: toastFade 0.2s ease; }
        @keyframes toastFade {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        /* ========== iframe 适配 ========== */
        html.in-iframe body { background: var(--fa-bg-page); }
        html.in-iframe .phone-frame {
            border-radius: 0;
            box-shadow: none;
            height: 100vh;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="phone-frame">
        <!-- 导航栏 -->
        <div class="nav-bar">
            <div class="nav-status-bar">
                <span>09:41</span>
                <span>●●● WiFi ▊</span>
            </div>
            <div class="nav-content">
                <button class="nav-back" onclick="goBack()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <span class="nav-title">历史网格巡查记录</span>
            </div>
        </div>

        <!-- 滚动内容 -->
        <div class="scroll-content" id="recordList">
            <!-- JS 渲染 -->
        </div>

        <!-- Toast -->
        <div class="td-toast" id="toast"></div>
    </div>
</div>

<script>
    // iframe 检测
    if (window.parent !== window) document.documentElement.classList.add('in-iframe');

    // ====== Mock 数据（与网格巡查记录页最新一条保持一致） ======
    const HISTORY_RECORDS = [
        { accessTime: '2025-06-27 05:04:28', isBusinessPlace: '是', hasFunctionChange: '否', hasDecoration: '是', hasAddition: '是' },
        { accessTime: '2025-05-30 14:22:15', isBusinessPlace: '是', hasFunctionChange: '否', hasDecoration: '否', hasAddition: '是' },
        { accessTime: '2025-05-02 09:11:03', isBusinessPlace: '是', hasFunctionChange: '否', hasDecoration: '是', hasAddition: '是' },
        { accessTime: '2025-04-04 16:38:47', isBusinessPlace: '否', hasFunctionChange: '否', hasDecoration: '否', hasAddition: '否' },
        { accessTime: '2025-03-07 11:55:32', isBusinessPlace: '是', hasFunctionChange: '是', hasDecoration: '否', hasAddition: '是' },
        { accessTime: '2025-02-07 08:20:19', isBusinessPlace: '否', hasFunctionChange: '否', hasDecoration: '否', hasAddition: '否' },
        { accessTime: '2025-01-10 17:44:08', isBusinessPlace: '是', hasFunctionChange: '否', hasDecoration: '是', hasAddition: '否' },
        { accessTime: '2024-12-13 06:33:51', isBusinessPlace: '否', hasFunctionChange: '否', hasDecoration: '否', hasAddition: '是' },
        { accessTime: '2024-11-15 13:07:26', isBusinessPlace: '是', hasFunctionChange: '否', hasDecoration: '否', hasAddition: '否' },
        { accessTime: '2024-10-18 10:49:55', isBusinessPlace: '否', hasFunctionChange: '是', hasDecoration: '是', hasAddition: '否' },
        { accessTime: '2024-09-20 15:16:34', isBusinessPlace: '是', hasFunctionChange: '否', hasDecoration: '否', hasAddition: '是' },
        { accessTime: '2024-08-23 20:02:42', isBusinessPlace: '否', hasFunctionChange: '否', hasDecoration: '否', hasAddition: '否' },
        { accessTime: '2024-07-26 07:58:17', isBusinessPlace: '是', hasFunctionChange: '否', hasDecoration: '是', hasAddition: '否' },
    ];

    // ====== 渲染 ======
    function tag(val) {
        if (val === '是') return '<span class="tag-yes">是</span>';
        if (val === '否') return '<span class="tag-no">否</span>';
        return val;
    }

    function renderList() {
        const container = document.getElementById('recordList');
        if (!HISTORY_RECORDS.length) {
            container.innerHTML = '<div class="empty-state">暂无历史记录</div>';
            return;
        }
        let html = '';
        HISTORY_RECORDS.forEach((r, i) => {
            html += '<div class="record-card" onclick="onCardClick(' + i + ')">'
                + '<div class="record-time">' + r.accessTime + '</div>'
                + '<div class="record-fields">'
                + '<div class="record-field"><span class="record-field-label">经营性场所</span>' + tag(r.isBusinessPlace) + '</div>'
                + '<div class="record-field"><span class="record-field-label">改变功能</span>' + tag(r.hasFunctionChange) + '</div>'
                + '<div class="record-field"><span class="record-field-label">装修</span>' + tag(r.hasDecoration) + '</div>'
                + '<div class="record-field"><span class="record-field-label">加建</span>' + tag(r.hasAddition) + '</div>'
                + '</div></div>';
        });
        container.innerHTML = html;
    }

    // ====== 导航 ======
    function navigateToPage(tab, params) {
        if (window.parent !== window) {
            window.parent.postMessage({ type: 'navigateToPage', tab: tab, params: params || {} }, '*');
        }
    }

    function onCardClick(index) {
        navigateToPage('gridRecordDetail', { recordIndex: index });
    }

    function goBack() {
        if (window.parent !== window) {
            window.parent.postMessage({ type: 'navigateBack' }, '*');
        } else {
            history.back();
        }
    }

    // ====== Toast ======
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    // ====== 初始化 ======
    renderList();
</script>

</body>
</html>
